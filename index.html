<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I spider</title>
    <style>
        /* RESET & GRUNDLAYOUT */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #FFFFFF;
            font-family: sans-serif;
            display: flex;
            height: 100vh; /* Exakt 100% Bildschirmhöhe, kein Scrollen! */
            overflow: hidden;
        }

        /* LINKE SPALTE: BILD */
        #left-pane {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #image-canvas {
            max-height: 85vh; /* Zwingt das Bild auf max. 85% Höhe */
            max-width: 100%;
            object-fit: contain;
        }

        /* RECHTE SPALTE: STEUERUNG */
        #right-pane {
            flex: 1;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            border-left: 1px solid #333; /* Dezente Trennlinie */
        }

        /* LOGO */
        #logo-container {
            text-align: right;
            margin-bottom: 20px;
        }
        #logo-container img {
            max-width: 200px;
            height: auto;
        }

        /* MENÜ (Dropdown) */
        #set-select {
            background-color: #111111;
            color: #FFFFFF;
            font-size: 24px;
            padding: 15px;
            border: 2px solid #FFFFFF;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
            outline: none;
        }
        #set-select option {
            background-color: #111111;
            color: #FFFFFF;
        }

        /* FRAGENTEXT */
        #question-text {
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            margin: auto 0; /* Drückt den Text in die Mitte der freien Fläche */
            line-height: 1.3;
        }

        /* BUTTON */
        #action-btn {
            background-color: transparent;
            color: #FFFFFF;
            font-size: 32px;
            font-weight: bold;
            border: 3px solid #4CAF50;
            border-radius: 10px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            width: 100%;
            margin-top: auto; /* Drückt den Button nach unten */
        }
        #action-btn:hover {
            background-color: #4CAF50;
            color: #000000;
        }

        /* COUNTER */
        #counter {
            text-align: right;
            color: gray;
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="left-pane">
        <canvas id="image-canvas"></canvas>
    </div>

    <div id="right-pane">
        <div id="logo-container">
            <img src="I spider.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        
        <select id="set-select"></select>
        
        <div id="question-text">What is the German idiom?</div>
        
        <button id="action-btn">Go on</button>
        
        <div id="counter">Idiom 1 / 6</div>
    </div>

    <script>
        let allIdioms = [];
        let currentSetPool = [];
        let currentIdiomIndex = 0;
        let currentStep = 1;

        // DOM Elemente verknüpfen
        const canvas = document.getElementById("image-canvas");
        const ctx = canvas.getContext("2d");
        const setSelect = document.getElementById("set-select");
        const questionText = document.getElementById("question-text");
        const actionBtn = document.getElementById("action-btn");
        const counterText = document.getElementById("counter");

        // 1. JSON-Daten laden
        fetch('idioms.json')
            .then(response => response.json())
            .then(data => {
                allIdioms = data;
                initMenu();
                changeSet(); // Erstes Set sofort laden
            })
            .catch(err => {
                questionText.innerHTML = "Fehler: 'idioms.json' nicht gefunden!";
                console.error(err);
            });

        // 2. Dropdown Menü aufbauen
        function initMenu() {
            for(let i=1; i<=10; i++) {
                let opt = document.createElement("option");
                opt.value = i;
                let start = (i-1)*6 + 1;
                let end = i < 10 ? i*6 : 59;
                opt.text = `Set ${i} (Idioms ${start}-${end})`;
                setSelect.add(opt);
            }
            setSelect.addEventListener("change", changeSet);
        }

        // 3. Mischen-Funktion (Shuffle)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 4. Set wechseln und mischen
        function changeSet() {
            let setNum = parseInt(setSelect.value);
            let startIndex = (setNum - 1) * 6;
            let endIndex = setNum < 10 ? startIndex + 6 : 59;
            
            // Pool kopieren und mischen
            currentSetPool = allIdioms.slice(startIndex, endIndex);
            shuffle(currentSetPool);
            
            currentIdiomIndex = 0;
            currentStep = 1;
            updateView();
        }

        // 5. Button Klick-Logik
        actionBtn.addEventListener("click", () => {
            if(currentStep >= 4) {
                currentStep = 1;
                currentIdiomIndex++;
                if(currentIdiomIndex >= currentSetPool.length) {
                    currentIdiomIndex = 0; // Fängt im Set wieder von vorn an
                }
            } else {
                currentStep++;
            }
            updateView();
        });

        // 6. Ansicht aktualisieren (Texte & Bild)
        function updateView() {
            let currentIdiom = currentSetPool[currentIdiomIndex];
            if(!currentIdiom) return;

            // Texte anpassen
            if(currentStep === 1) {
                questionText.innerText = "What is the German idiom?";
                actionBtn.innerText = "Go on";
            } else if(currentStep === 2) {
                questionText.innerText = "Recognize the idiom in German!";
                actionBtn.innerText = "Go on";
            } else if(currentStep === 3) {
                questionText.innerText = "What is the correct English phrase?";
                actionBtn.innerText = "Go on";
            } else if(currentStep === 4) {
                questionText.innerText = "Here is the correct answer!";
                actionBtn.innerText = "Next idiom";
            }

            counterText.innerText = `Idiom ${currentIdiomIndex + 1} / ${currentSetPool.length}`;

            // Bild laden und mit schwarzen Balken maskieren
            let imgObj = new Image();
            imgObj.onload = () => {
                canvas.width = imgObj.width;
                canvas.height = imgObj.height;
                ctx.drawImage(imgObj, 0, 0);
                
                // Zeichnet exakt die gleichen schwarzen Rechtecke wie das alte Python-Script
                ctx.fillStyle = "#000000";
                if (currentStep === 2) {
                    ctx.fillRect(0, imgObj.height * 0.25, imgObj.width, imgObj.height);
                } else if (currentStep === 3) {
                    // Maske bei 12% (0.88), um den unteren Kreis zuverlässig zu verdecken
                    ctx.fillRect(0, imgObj.height * 0.88, imgObj.width, imgObj.height);
                }
            };
            
            // Entscheidet, ob Bild A (Falsch) oder Bild B (Auflösung) geladen wird
            let pfad = (currentStep === 1) ? currentIdiom.image_a : currentIdiom.image_b;
            imgObj.src = "Pictures/" + pfad;
        }
    </script>
</body>
</html>
